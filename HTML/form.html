<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
</head>

<body>
    <h1>Student Registration Form</h1>
    <form>
        <label for="fullname">Fullname:</label>
        <input type="text" id="fullname" name="fullname" placeholder="XYZ......" required><br>

        <label for="Email">Email:</label>
        <input type="email" id="Email" name="Email" placeholder="xyz@abc.com"><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Enter password" required><br>

        <label for="number">Phone Number:</label>
        <input type="tel" id="number" name="number" placeholder="2382437229"><br>

        Gender:
        <label for="male">Male</label>
        <input type="radio" id="male" name="gender" value="male">

        <label for="female">Female</label>
        <input type="radio" id="female" name="gender" value="female"><br>

        Hobbies:
        <label for="cricket">Cricket</label>
        <input type="checkbox" id="cricket" name="hobbies" value="cricket" checked>

        <label for="Gym">Gym</label>
        <input type="checkbox" id="Gym" name="hobbies" value="Gym">

        <label for="Coding">Coding</label>
        <input type="checkbox" id="Coding" name="hobbies" value="Coding">

        <label for="Music">Music</label>
        <input type="checkbox" id="Music" name="hobbies" value="Music"><br>

        City:
        <select name="cities" id="cities">
            <option value="Delhi">Delhi</option>
            <option value="Mumbai">Mumbai</option>
            <option value="Dehradun">Dehradun</option>
            <option value="Haldwani">Haldwani</option>
        </select><br>

        Address:
        <textarea name="address" id="address" rows="3" cols="60"
            placeholder="Enter your address here...."></textarea><br>

        <label for="DOB">Date of Birth:</label>
        <input type="date" id="DOB" name="DOB" required>
        <br>

        <label for="photo">Upload Photo:</label>
        <input type="file" id="photo" name="photo" required><br>
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
    </form>
</body>

</html>
